# Mac Mini nginx config — 由 deploy/setup-macos.sh 安裝到
#   $(brew --prefix)/etc/nginx/servers/sbom.conf
# 佔位符 __SBOM_HOME__ 會被 setup-macos.sh 用 sed 替換為實際路徑(預設 $HOME/sbom)。
#
# server_name 預設 _ (吃所有來源,適合 LAN 直連 / Tailscale)。
# 如果要綁特定 hostname 並上 TLS:
#   server_name sbom.example.com;
#   listen 443 ssl;
#   ssl_certificate     /path/to/fullchain.pem;
#   ssl_certificate_key /path/to/privkey.pem;
# 並用 certbot 或 acme.sh 取憑證。

server {
    listen 80;
    server_name _;

    # gzip 壓縮(節省流量,加快載入)
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # React SPA 靜態檔
    root __SBOM_HOME__/frontend/dist;
    index index.html;

    # 靜態資源強快取
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /api/ {
        proxy_pass         http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 55M;
    }

    # health check (直接打 backend)
    location /health {
        proxy_pass http://127.0.0.1:9100/health;
    }

    # SPA fallback — 所有非 API 路由交給 React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
