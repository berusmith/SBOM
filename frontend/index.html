<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover allows the page to extend into iPhone safe-area
         insets (notch, Dynamic Island, Home Indicator).  Safe-area padding
         on body in index.css keeps content out of those zones. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Matches the dark top nav (Tailwind gray-900 = #111827).  Android
         Chrome uses this to tint the URL bar when our site is loaded. -->
    <meta name="theme-color" content="#111827" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>SBOM Management Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
