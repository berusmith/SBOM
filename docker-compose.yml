version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sbom
      POSTGRES_PASSWORD: sbom
      POSTGRES_DB: sbomdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbom -d sbomdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  dependencytrack-apiserver:
    image: dependencytrack/apiserver:4.11.7
    environment:
      ALPINE_DATABASE_MODE: external
      ALPINE_DATABASE_URL: jdbc:postgresql://postgres:5432/sbomdb
      ALPINE_DATABASE_DRIVER: org.postgresql.Driver
      ALPINE_DATABASE_USERNAME: sbom
      ALPINE_DATABASE_PASSWORD: sbom
    volumes:
      - dtrack_data:/data
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dependencytrack-frontend:
    image: dependencytrack/frontend:4.11.7
    environment:
      API_BASE_URL: http://localhost:8080
    ports:
      - "8081:8080"
    depends_on:
      - dependencytrack-apiserver
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://sbom:sbom@postgres:5432/sbomdb
      DTRACK_URL: http://dependencytrack-apiserver:8080
      DTRACK_API_KEY: ${DTRACK_API_KEY:-}
    volumes:
      - ./backend:/app
      - sbom_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # vuln-mirror: disabled — enable for air-gapped/offline environments
  # vuln-mirror:
  #   image: ghcr.io/jeremylong/open-vulnerability-data-mirror:latest
  #   volumes:
  #     - vuln_mirror_data:/data
  #   ports:
  #     - "8888:8888"

volumes:
  postgres_data:
  dtrack_data:
  sbom_uploads:
  # vuln_mirror_data:
