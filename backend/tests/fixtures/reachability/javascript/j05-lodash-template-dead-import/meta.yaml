notes: |
  ES6 named import `import { template } from 'lodash'` followed by
  zero call sites — leftover from a refactor that removed templating.
  Bundler tree-shaking would drop this in production, but at source-
  level analysis the import is present.  Symbol-aware analyzer must
  detect that `template` is bound but never invoked, and downgrade
  to not_found.

  NOTE: known limitation — current package-level analyzer flags
  lodash as "reachable" purely based on import presence.
