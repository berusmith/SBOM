notes: |
  Open redirect — Express encodes the URL via `encodeurl` before
  passing to the Location header.  Malformed URLs can bypass
  redirect allowlist checks, enabling open-redirect attacks.
  res.redirect calls res.location internally, so reachability of
  either marks the CVE reachable.  Verified via WebFetch on
  GHSA-rv95-896h-c2vc — symbols confirmed in advisory text.
