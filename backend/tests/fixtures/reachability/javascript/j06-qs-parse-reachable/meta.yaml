notes: |
  Prototype pollution via qs.parse on attacker-controlled query
  strings.  Crafted ?__proto__[polluted]=1 walks up the prototype
  chain.  Express used to bundle qs as default body-parser, which
  is why CVE-2022-24999 was assigned to express despite the actual
  vuln living in qs.
