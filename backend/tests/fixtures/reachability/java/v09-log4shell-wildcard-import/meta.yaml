notes: |
  Wildcard import edge — `import org.apache.logging.log4j.*`
  brings every public type from the package into scope.  Subsequent
  references like `LogManager.getLogger(...)` and `Logger logger`
  are unqualified.  Analyzer must resolve `LogManager` and `Logger`
  to FQNs by checking the wildcard imports in scope.

  Common Java idiom in older codebases / quick prototypes.
