fixture_type: cve_reachability
cve_id: CVE-2022-22965
ghsa_id: GHSA-36p3-wjmg-h94x
package: org.springframework:spring-beans
import_names: [org.springframework.beans, org.springframework.stereotype]
ecosystem: maven
affected_versions: ">=5.3.0,<5.3.18 || >=5.2.0,<5.2.20"
language: java
expected_reachable: false
expected_label: not_found
transitive_only: false
vulnerable_symbols:
  - org.springframework.beans.PropertyAccessor
  - org.springframework.beans.BeanWrapperImpl
notes: |
  spring-beans is on the classpath and `@Service` classes exist —
  but NO @RestController / @Controller exposes any HTTP endpoint
  that binds a POJO from request parameters.  Without an HTTP
  entry point the data-binding attack surface doesn't exist;
  Spring4Shell cannot fire.

  Symbol-level analyzer must recognise: presence of @Service /
  @Component alone is not enough — there must be a route handler
  with @ModelAttribute (or implicit binding) for the CVE to be
  reachable.
