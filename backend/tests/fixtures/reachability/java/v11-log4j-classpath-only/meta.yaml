notes: |
  log4j-core is on the classpath via pom.xml but **no source file
  in the project imports `org.apache.logging.log4j.*`** — typically
  pulled in transitively by another dep that someone forgot to
  exclude.  Without an import there's no Logger instance, so the
  JNDI lookup path cannot fire from this app.

  This is the canonical "transitive_only=true" case.  Distinct
  from V2 (imports + uses with literal arg) and V5 (imports auth
  but no controller) — V11 has zero source-level use.
