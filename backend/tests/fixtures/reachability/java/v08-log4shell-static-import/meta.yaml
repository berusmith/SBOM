expected_reachable: true
expected_label: function_reachable
transitive_only: false
vulnerable_symbols:
  - org.apache.logging.log4j.Logger.error
notes: |
  Static import edge — `import static
  org.apache.logging.log4j.LogManager.getLogger;` brings the
  getLogger() method directly into scope.  Subsequent call site
  reads as `getLogger(Foo.class).error(...)` with no `LogManager.`
  qualifier.  Analyzer must follow the static import to resolve
  `getLogger` back to LogManager.getLogger.

  Common in test code (assertEquals etc.) but rarer in production
  Logger setup — still occurs in idiomatic JUnit 5 / AssertJ codebases.
