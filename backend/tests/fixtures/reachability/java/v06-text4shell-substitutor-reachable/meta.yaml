notes: |
  Text4Shell — StringSubstitutor.replace evaluates `${prefix:body}`
  patterns including dangerous ones: ${script:javascript:...} runs
  Nashorn JS, ${url:...} fetches arbitrary URLs (SSRF), ${dns:...}
  exfiltrates via DNS.  Trigger is any call to .replace() with
  attacker-controlled input.
