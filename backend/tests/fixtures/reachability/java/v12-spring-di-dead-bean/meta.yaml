notes: |
  DI dead-code edge — a `@Component` bean exists with the
  vulnerable POJO data-binding signature, but **no controller**
  ever `@Autowired`s it or exposes it via an HTTP endpoint.  The
  bean is created by Spring at startup but nothing routes user
  input to it, so Spring4Shell cannot fire.

  This is the deepest static-analysis case — ideally requires
  full DI graph construction (find every @Autowired path, check
  which are reachable from controllers).  Sprint #3 might
  reasonably mark this as `function_reachable` (over-approximation
  on @Component presence) and document the limitation; this
  fixture quantifies that policy choice.
