notes: |
  Standard Pillow image I/O — Image.open / .resize / .save /
  .thumbnail.  ImageMath module is never imported.  The vulnerable
  eval() path cannot be triggered without an explicit
  `from PIL import ImageMath` somewhere.

  NOTE: known limitation — current package-level analyzer will
  flag pillow as "reachable" here.  Sprint #3 must check for the
  ImageMath sub-import specifically.
