fixture_type: cve_reachability
cve_id: CVE-2019-19844
ghsa_id: GHSA-vfq6-hq5r-27r6
package: django
import_names: [django]
ecosystem: pypi
affected_versions: ">=2.1,<2.2.9 || >=3.0,<3.0.1 || <1.11.27"
language: python
expected_reachable: true
expected_label: function_reachable
transitive_only: false
vulnerable_symbols:
  - django.contrib.auth.forms.PasswordResetForm.get_users
  - django.contrib.auth.forms.PasswordResetForm.save
notes: |
  Triggers the case-insensitive Unicode email matching path in
  PasswordResetForm.get_users().  An attacker registers an email
  containing characters that case-fold to a victim's email
  (e.g. uppercase ß folds to ss) and requests a password reset —
  the token is sent to the attacker's address but reset the
  victim's account.  Fix: send tokens only to the registered
  address.
